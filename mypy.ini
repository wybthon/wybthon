[mypy]
python_version = 3.9
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
strict_optional = False
pretty = True
files = src, tests, examples, benchmarks
# The browser E2E fixture under tests/e2e/app is Pyodide-runtime code: it uses
# absolute ``app.*`` imports that only resolve inside the Pyodide filesystem and
# collide with the canonical ``app`` package under examples/demo. It is never
# imported by pytest (only mounted in the browser), so it is excluded from
# static type checking.
exclude = (?x)(^tests/e2e/app/)

[mypy-_pytest.*]
follow_imports = skip

[mypy-js]
ignore_missing_imports = True
