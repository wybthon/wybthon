extends:
  - '@commitlint/config-conventional'

rules:
  type-enum:
    - 2
    - always
    - - build
      - chore
      - ci
      - docs
      - feat
      - fix
      - perf
      - refactor
      - revert
      - style
      - test
  scope-case:
    - 0
  subject-case:
    - 0
  header-max-length:
    - 1
    - always
    - 100
  body-max-line-length:
    - 0
  footer-max-line-length:
    - 0
